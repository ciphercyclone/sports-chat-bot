<!-- Bottom Input Area -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant px-sm sm:px-margin py-sm flex items-end gap-sm pb-[calc(16px+env(safe-area-inset-bottom))]">

<span class="material-symbols-outlined">attach_file</span>
</button>
<div class="flex-1 min-h-[48px] sm:min-h-[56px] bg-surface-container-low rounded-3xl border border-outline-variant flex items-center px-sm sm:px-margin relative">
<textarea class="w-full bg-transparent border-none focus:ring-0 resize-none font-body-md text-body-md text-on-surface placeholder-outline py-sm sm:py-md m-0 p-0 block text-sm sm:text-base" placeholder="Ask SportsBot anything..." rows="1"></textarea>
</div>
<button class="h-[48px] sm:h-[56px] w-[48px] sm:w-[56px] flex-shrink-0 flex items-center justify-center bg-primary-container text-on-primary-container rounded-full opacity-50 cursor-not-allowed transition-opacity shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
</button>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const textarea = document.querySelector('textarea');
    const sendBtn = document.querySelector('button.bg-primary-container');
    const attachBtn = Array.from(document.querySelectorAll('.material-symbols-outlined')).find(el => el.textContent.trim() === 'attach_file').closest('button');
    const mainEl = document.querySelector('main');
    
    const chatContainer = document.createElement('div');
    chatContainer.id = 'chat-list';
    chatContainer.className = 'w-full flex flex-col gap-4 flex-1 overflow-y-auto';
    chatContainer.style.display = 'none';
    
    const emptyState = document.createElement('div');
    emptyState.className = 'flex flex-col items-center justify-center w-full max-w-2xl mx-auto empty-state min-h-[400px]';
    while (mainEl.firstChild) {
        emptyState.appendChild(mainEl.firstChild);
    }
    mainEl.appendChild(emptyState);
    mainEl.appendChild(chatContainer);
    
    const chips = emptyState.querySelectorAll('button');
    chips.forEach(chip => {
        chip.addEventListener('click', () => {
            const text = chip.querySelector('.font-body-md')?.textContent || chip.textContent;
            textarea.value = text.trim();
            checkInput();
            handleSend();
        });
    });

    let conversationHistory = [];
    let selectedFile = null;
    
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*';
    fileInput.style.display = 'none';
    document.body.appendChild(fileInput);
    
    attachBtn.addEventListener('click', () => {
        fileInput.click();
    });
    
    const inputWrapper = textarea.parentElement;
    const previewContainer = document.createElement('div');
    previewContainer.className = 'absolute left-4 -top-16 w-12 h-12 rounded-lg border border-outline-variant bg-surface overflow-hidden hidden shadow-md';
    const previewImg = document.createElement('img');
    previewImg.className = 'w-full h-full object-cover';
    previewContainer.appendChild(previewImg);
    
    const clearPreviewBtn = document.createElement('button');
    clearPreviewBtn.innerHTML = '<span class="material-symbols-outlined text-[16px]">close</span>';
    clearPreviewBtn.className = 'absolute top-0 right-0 bg-black/50 text-white rounded-full w-4 h-4 flex items-center justify-center m-1';
    clearPreviewBtn.onclick = (e) => {
        e.stopPropagation();
        clearFile();
    };
    previewContainer.appendChild(clearPreviewBtn);
    inputWrapper.appendChild(previewContainer);
    
    function clearFile() {
        selectedFile = null;
        fileInput.value = '';
        previewContainer.classList.add('hidden');
        checkInput();
    }
    
    fileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
            selectedFile = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                previewImg.src = ev.target.result;
                previewContainer.classList.remove('hidden');
                checkInput();
            };
            reader.readAsDataURL(selectedFile);
        }
    });

    function checkInput() {
        if (textarea.value.trim() === '' && !selectedFile) {
            sendBtn.disabled = true;
            sendBtn.classList.add('opacity-50', 'cursor-not-allowed');
        } else {
            sendBtn.disabled = false;
            sendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
    }

    textarea.addEventListener('input', () => {
        textarea.style.height = 'auto';
        textarea.style.height = (textarea.scrollHeight) + 'px';
        checkInput();
    });
    
    textarea.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            if (!sendBtn.disabled) handleSend();
        }
    });

    sendBtn.addEventListener('click', () => {
        if (!sendBtn.disabled) handleSend();
    });
    
    function appendMessage(role, text) {
        if (emptyState.style.display !== 'none') {
            emptyState.style.display = 'none';
            chatContainer.style.display = 'flex';
            mainEl.classList.remove('justify-center');
            mainEl.classList.add('justify-start');
            // Set explicit height for proper scrolling
            const headerHeight = 60;
            const bottomHeight = 80;
            const availableHeight = window.innerHeight - headerHeight - bottomHeight;
            chatContainer.style.height = availableHeight + 'px';
        }
        
        const bubble = document.createElement('div');
        bubble.className = `max-w-[85%] sm:max-w-[75%] rounded-2xl p-3 sm:p-4 ${role === 'user' ? 'bg-primary-container text-on-primary-container self-end rounded-br-sm' : 'bg-surface-container text-on-surface self-start rounded-bl-sm'}`;
        
        if (role === 'user') {
            bubble.textContent = text;
        } else {
            bubble.innerHTML = marked.parse(text);
            const p = bubble.querySelectorAll('p');
            p.forEach(el => el.classList.add('mb-2', 'last:mb-0'));
            const ul = bubble.querySelectorAll('ul');
            ul.forEach(el => el.classList.add('list-disc', 'ml-4', 'mb-2'));
            const ol = bubble.querySelectorAll('ol');
            ol.forEach(el => el.classList.add('list-decimal', 'ml-4', 'mb-2'));
            const a = bubble.querySelectorAll('a');
            a.forEach(el => el.classList.add('text-primary', 'underline'));
            const strong = bubble.querySelectorAll('strong');
            strong.forEach(el => el.classList.add('font-bold'));
            const h1 = bubble.querySelectorAll('h1, h2, h3');
            h1.forEach(el => el.classList.add('font-bold', 'mb-2', 'mt-4'));
        }
        
        chatContainer.appendChild(bubble);
        // Smooth scroll to bottom
        setTimeout(() => {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }, 100);
        
        return bubble;
    }

    // Handle window resize for responsive behavior
    window.addEventListener('resize', () => {
        if (chatContainer.style.display === 'flex') {
            const headerHeight = 60;
            const bottomHeight = 80;
            const availableHeight = window.innerHeight - headerHeight - bottomHeight;
            chatContainer.style.height = availableHeight + 'px';
        }
    });

    async function handleSend() {
        const text = textarea.value.trim();
        if (!text && !selectedFile) return;
        
        const currentFile = selectedFile;
        const currentText = text;
        
        let displayMsg = currentText;
        if (currentFile) displayMsg = `[Image Attached] ${currentText}`.trim();
        appendMessage('user', displayMsg);
        
        textarea.value = '';
        textarea.style.height = 'auto';
        clearFile();
        checkInput();
        
        conversationHistory.push({
            role: "user",
            parts: [{text: displayMsg}]
        });
        
        const loadingBubble = appendMessage('model', '...');
        
        try {
            let res;
            if (currentFile) {
                const formData = new FormData();
                formData.append('file', currentFile);
                formData.append('prompt', currentText);
                
                res = await fetch('/vision', {
                    method: 'POST',
                    body: formData
                });
            } else {
                res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: currentText,
                        history: conversationHistory.slice(0, -1)
                    })
                });
            }
            
            const data = await res.json();
            const reply = data.reply || "Something went wrong.";
            
            chatContainer.removeChild(loadingBubble);
            appendMessage('model', reply);
            
            conversationHistory.push({
                role: "model",
                parts: [{text: reply}]
            });
            
        } catch (err) {
            chatContainer.removeChild(loadingBubble);
            appendMessage('model', "Something went wrong — please retry.");
        }
    }
});
</script>
